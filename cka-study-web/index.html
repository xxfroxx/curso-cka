<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kestrion — Preparación CKA en español</title>
    <meta name="description" content="Web de estudio interactiva para el examen CKA: quiz de autoevaluación, laboratorios cronometrados y seguimiento de progreso. Gratis y sin registro.">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%232563eb'/%3E%3Ctext x='32' y='44' font-family='sans-serif' font-size='30' font-weight='800' fill='white' text-anchor='middle'%3EK%3C/text%3E%3C/svg%3E">
    <script>
      try {
        const forced = new URLSearchParams(location.search).get("theme");
        document.documentElement.dataset.theme = forced || localStorage.getItem("cka.theme") || "light";
      } catch (error) { /* sin localStorage: tema claro */ }
    </script>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Índice del curso">
        <div class="brand">
          <div class="brand-mark">K</div>
          <div>
            <p class="eyebrow">Kestrion</p>
            <h1>Preparación CKA</h1>
          </div>
        </div>

        <label class="search">
          <span>Buscar en todo el curso</span>
          <input id="searchInput" type="search" placeholder="kubectl, etcd, drain…" autocomplete="off">
        </label>

        <nav id="moduleNav" class="module-nav"></nav>

        <p class="sidebar-foot" id="sourceFoot">Fuente: <code>modulos/</code><br>Edita los TXT y refresca la página.</p>
      </aside>

      <div id="scrim" class="scrim" aria-hidden="true"></div>

      <main class="content">
        <header class="topbar">
          <button id="menuButton" class="icon-button" type="button" aria-label="Mostrar índice">☰</button>
          <div class="topbar-title">
            <p id="crumb" class="eyebrow">Cargando…</p>
            <h2 id="pageTitle">Kestrion</h2>
          </div>
          <div class="topbar-actions">
            <button id="continueChip" class="continue-chip" type="button" hidden></button>
            <button id="expandAll" class="small-button" type="button">Expandir</button>
            <button id="collapseAll" class="small-button" type="button">Contraer</button>
            <button id="themeToggle" class="icon-button theme-toggle" type="button" aria-label="Cambiar tema"></button>
          </div>
        </header>

        <section id="overview" class="overview" aria-label="Resumen del curso"></section>
        <section id="searchState" class="search-state" hidden></section>
        <section id="searchResults" class="search-results" hidden></section>
        <section id="courseContent" class="course-content"></section>
      </main>
    </div>

    <script src="./parser.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
